<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>تعلم الأمن السيبراني والهاكر الأخلاقي - CyberMaster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #010618, #0c1a33);
            color: #00ff99;
            direction: rtl;
        }
        header {
            background: #011627;
            padding: 20px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,255,153,0.3);
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
        #search-box {
            margin: 20px auto;
            max-width: 600px;
            text-align: center;
        }
        #search-box input {
            width: 90%;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: none;
            outline: none;
            background: #02253a;
            color: #00ff99;
            box-shadow: 0 0 10px #00ff99;
            transition: box-shadow 0.3s ease;
        }
        #search-box input:focus {
            box-shadow: 0 0 20px #00ffaa;
        }
        .branches {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
            gap: 15px;
            max-width: 1100px;
            margin: 30px auto 50px;
            padding: 0 15px;
        }
        .branch {
            background: #011627;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 12px rgba(0, 255, 153, 0.4);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: 600;
            font-size: 1.1rem;
            user-select: none;
            text-align: center;
        }
        .branch:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #00ff99;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #011627;
            color: #00ff99;
            font-size: 0.9rem;
            box-shadow: 0 -3px 10px rgba(0,255,153,0.3);
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        @media(max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }
            .branch {
                font-size: 1rem;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>تعلم الأمن السيبراني والهاكر الأخلاقي</h1>
</header>

<div id="search-box">
    <input type="text" id="search-input" placeholder="ابحث في الفروع..." />
</div>

<div class="branches" id="branches-container">
    <!-- الفروع تظهر هنا -->
</div>

<footer>
    &copy; 2025 CyberMaster - كل الحقوق محفوظة
</footer>

<script>
    // هنا قائمة 100 فرع (مثال مختصر مع بعض الفروع)
    const branches = [
        "مقدمة في الأمن السيبراني",
        "أساسيات الشبكات",
        "أنظمة التشغيل وتأمينها",
        "الهاكر الأخلاقي: المبادئ والقوانين",
        "هجمات SQL Injection وكيفية الحماية",
        "اختبار الاختراق (Penetration Testing)",
        "تشفير البيانات",
        "تحليل البرمجيات الخبيثة",
        "أمن تطبيقات الويب",
        "الجدران النارية (Firewalls)",
        // ... أضف هنا باقي الفروع ليصلوا 100
    ];

    const container = document.getElementById("branches-container");
    const searchInput = document.getElementById("search-input");

    // دالة عرض الفروع
    function displayBranches(filter = "") {
        container.innerHTML = "";
        const filtered = branches.filter(branch =>
            branch.includes(filter)
        );
        if (filtered.length === 0) {
            container.innerHTML = "<p style='color:#ff5555; text-align:center;'>لا توجد نتائج</p>";
            return;
        }
        filtered.forEach((branch, idx) => {
            const div = document.createElement("div");
            div.className = "branch";
            div.textContent = branch;
            div.onclick = () => {
                alert(`سيتم تحويلك إلى صفحة: ${branch} (قيد التطوير)`);
                // لاحقاً نربط هنا صفحة الفرع
            };
            container.appendChild(div);
        });
    }

    searchInput.addEventListener("input", (e) => {
        displayBranches(e.target.value);
    });

    // عرض كل الفروع أول مرة
    displayBranches();

</script>

</body>
</html>
