
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر البطاقات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>متجر البطاقات</h1>
        <a href="login.html" class="btn">تسجيل الدخول</a>
        <a href="cart.html" class="btn">السلة</a>
    </header>
    <main>
        <div class="product">
            <h2>بطاقة Google Play</h2>
            <button onclick="addToCart('بطاقة Google Play')">أضف إلى السلة</button>
        </div>
        <div class="product">
            <h2>بطاقة PUBG UC</h2>
            <button onclick="addToCart('بطاقة PUBG UC')">أضف إلى السلة</button>
        </div>
    </main>
    <script>
        function addToCart(product) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.push(product);
            localStorage.setItem("cart", JSON.stringify(cart));
            alert(product + " تم إضافتها إلى السلة");
        }
    </script>
</body>
</html>
