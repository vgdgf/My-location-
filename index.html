<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CyberMind Academy - أكاديمية الأمن السيبراني</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* Reset */
  * {
    box-sizing: border-box;
    margin: 0; padding: 0;
  }
  body {
    font-family: 'Cairo', sans-serif;
    background: #121212;
    color: #00ff99;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  header {
    margin-bottom: 30px;
    text-align: center;
  }
  header h1 {
    font-size: 3rem;
    font-weight: 900;
    color: #00ff99;
    text-shadow: 0 0 10px #00ff99;
    letter-spacing: 2px;
  }
  header p {
    font-size: 1.3rem;
    color: #0f0;
    margin-top: 8px;
  }

  /* شبكة المربعات */
  .grid-container {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 1400px;
  }
  .grid-item {
    background: linear-gradient(135deg, #004d40, #00796b);
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    color: #00ff99;
    font-weight: 700;
    font-size: 0.9rem;
    box-shadow: 0 0 15px #00ff99aa;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 90px;
    user-select: none;
  }
  .grid-item:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #00ff99ff;
  }
  .grid-item .icon {
    font-size: 2.4rem;
    margin-bottom: 8px;
  }

  /* ألوان مختلفة للمربعات عبر 10 مجموعات */
  .color-1 { background: linear-gradient(135deg, #004d40, #00796b); }
  .color-2 { background: linear-gradient(135deg, #1a237e, #3949ab); }
  .color-3 { background: linear-gradient(135deg, #880e4f, #ad1457); }
  .color-4 { background: linear-gradient(135deg, #004d40, #43a047); }
  .color-5 { background: linear-gradient(135deg, #f57c00, #fb8c00); }
  .color-6 { background: linear-gradient(135deg, #006064, #0097a7); }
  .color-7 { background: linear-gradient(135deg, #bf360c, #d84315); }
  .color-8 { background: linear-gradient(135deg, #283593, #5c6bc0); }
  .color-9 { background: linear-gradient(135deg, #4a148c, #7b1fa2); }
  .color-10 { background: linear-gradient(135deg, #0d47a1, #1976d2); }

  /* جزء البحث */
  #search-box {
    width: 100%;
    max-width: 400px;
    margin-bottom: 25px;
    padding: 12px 20px;
    font-size: 1.1rem;
    border-radius: 30px;
    border: none;
    outline: none;
    box-shadow: 0 0 10px #00ff99aa;
    background: #1f1f1f;
    color: #00ff99;
    transition: box-shadow 0.3s ease;
  }
  #search-box:focus {
    box-shadow: 0 0 20px #00ff99;
  }

  /* رسالة لا نتائج */
  #no-results {
    margin-top: 30px;
    font-size: 1.5rem;
    color: #f00;
    text-align: center;
    display: none;
  }

  /* Responsive */
  @media (max-width: 1200px) {
    .grid-container {
      grid-template-columns: repeat(5, 1fr);
    }
    .grid-item {
      font-size: 0.85rem;
      min-height: 80px;
    }
  }
  @media (max-width: 600px) {
    .grid-container {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .grid-item {
      font-size: 0.8rem;
      min-height: 70px;
    }
  }
</style>
</head>
<body>

<header>
  <h1>CyberMind Academy</h1>
  <p>أكاديمية الأمن السيبراني والهاكر الأخلاقي - 100 فرع تعليمي</p>
</header>

<input type="text" id="search-box" placeholder="ابحث عن فرع تعليمي... 🔍" />

<div class="grid-container" id="grid-container">
  <!-- 100 عنصر سوف نولّدهم بالـ JavaScript -->
</div>

<div id="no-results">⚠️ لم يتم العثور على نتائج مطابقة.</div>

<script>
  // قائمة الـ 100 فرع تعليمي مع أيقونات مميزة (رموز من emoji لأبسط البداية)
  const branches = [
    { name: "مقدمة في الأمن السيبراني", icon: "🛡️" },
    { name: "أنظمة التشغيل", icon: "💻" },
    { name: "الشبكات", icon: "🌐" },
    { name: "بروتوكولات الإنترنت", icon: "📡" },
    { name: "التحليل الجنائي الرقمي", icon: "🔍" },
    { name: "تشفير البيانات", icon: "🔐" },
    { name: "الهاكر الأخلاقي", icon: "🕵️‍♂️" },
    { name: "فحص الاختراق", icon: "🛠️" },
    { name: "البرمجة الأمنية", icon: "📟" },
    { name: "اختبار الاختراق", icon: "🧪" },
    // ... (نكرر حتى 100 مع أسماء وأيقونات مختلفة)
  ];

  // توليد 100 عنصر وهمي (لو القائمة أقل من 100 نكرر)
  while (branches.length < 100) {
    branches.push({ name: `فرع تعليمي ${branches.length + 1}`, icon: "📚" });
  }

  const grid = document.getElementById("grid-container");
  const searchBox = document.getElementById("search-box");
  const noResults = document.getElementById("no-results");

  // توليد الشبكة
  function renderGrid(filter = "") {
    grid.innerHTML = "";
    const filtered = branches.filter(branch =>
      branch.name.includes(filter)
    );

    if (filtered.length === 0) {
      noResults.style.display = "block";
      return;
    } else {
      noResults.style.display = "none";
    }

    filtered.forEach((branch, i) => {
      const div = document.createElement("div");
      div.className = `grid-item color-${(i % 10) + 1}`;
      div.innerHTML = `<div class="icon">${branch.icon}</div>${branch.name}`;
      div.onclick = () => alert(`تم اختيار الفرع: ${branch.name}`);
      grid.appendChild(div);
    });
  }

  // عند البحث يحدث التصفية
  searchBox.addEventListener("input", (e) => {
    renderGrid(e.target.value.trim());
  });

  // أول عرض للشبكة
  renderGrid();
</script>

</body>
</html>
