<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Libya X Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- خط عربي جميل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            color: #00ff99;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #121212;
            padding: 20px;
            box-shadow: 0 2px 10px rgba(0, 255, 153, 0.1);
        }

        header h1 {
            font-size: 26px;
            color: #00ff99;
            margin: 0;
        }

        .btn {
            background: linear-gradient(to right, #00ff99, #00ffaa);
            color: #000;
            padding: 10px 20px;
            margin-left: 10px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 255, 153, 0.2);
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 255, 153, 0.4);
        }

        main {
            padding: 40px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .product {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            width: 280px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(0, 255, 153, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0, 255, 153, 0.2);
        }

        .product h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #fff;
        }

        .product button {
            background: linear-gradient(to right, #00ff99, #00ffaa);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .product button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 255, 153, 0.4);
        }
    </style>
</head>
<body>
    <header>
        <h1>🛒 Libya X Store</h1>
        <div>
            <a href="login.html" class="btn">تسجيل الدخول</a>
            <a href="cart.html" class="btn">السلة</a>
        </div>
    </header>

    <main>
        <div class="product">
            <h2>بطاقة Google Play</h2>
            <button onclick="addToCart('بطاقة Google Play')">أضف إلى السلة</button>
        </div>
        <div class="product">
            <h2>بطاقة PUBG UC</h2>
            <button onclick="addToCart('بطاقة PUBG UC')">أضف إلى السلة</button>
        </div>
        <div class="product">
            <h2>بطاقة Apple iTunes</h2>
            <button onclick="addToCart('بطاقة Apple iTunes')">أضف إلى السلة</button>
        </div>
    </main>

    <script>
        function addToCart(product) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.push(product);
            localStorage.setItem("cart", JSON.stringify(cart));
            alert("✅ " + product + " تم إضافتها إلى السلة بنجاح!");
        }
    </script>
</body>
</html>
