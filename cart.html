<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>السلة - Libya X Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- خط عصري -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0e0e0e, #1c1c1c);
            color: #00ff99;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .cart-box {
            background: #1f1f1f;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 153, 0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #00ffaa;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-bottom: 25px;
        }

        li {
            background: #2b2b2b;
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 255, 153, 0.1);
        }

        .btn {
            display: inline-block;
            background: linear-gradient(to right, #00ffaa, #00ff99);
            color: #000;
            padding: 12px 25px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 255, 153, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 18px rgba(0, 255, 153, 0.4);
        }
    </style>
</head>
<body>
    <div class="cart-box">
        <h2>🛒 محتويات السلة</h2>
        <ul id="cart-items"></ul>
        <a href="tel:*122*0926527327*40000*1#" class="btn">💳 الدفع الآن</a>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let list = document.getElementById("cart-items");

        if (cart.length === 0) {
            let li = document.createElement("li");
            li.textContent = "السلة فارغة حالياً 🛍️";
            list.appendChild(li);
        } else {
            cart.forEach(item => {
                let li = document.createElement("li");
                li.textContent = item;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
