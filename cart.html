
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>السلة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cart-box">
        <h2>محتويات السلة</h2>
        <ul id="cart-items"></ul>
        <a href="tel:*122*0926527327*40000*1#" class="btn">الدفع الآن</a>
    </div>
    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let list = document.getElementById("cart-items");
        cart.forEach(item => {
            let li = document.createElement("li");
            li.textContent = item;
            list.appendChild(li);
        });
    </script>
</body>
</html>
