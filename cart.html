<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>السلة - Libya X Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        body {
            background: linear-gradient(135deg, #0e0e0e, #1c1c1c);
            color: #00ff99;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .cart-box {
            background: #1f1f1f;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 153, 0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #00ffaa;
        }
        ul {
            list-style: none;
            padding: 0;
            margin-bottom: 15px;
            text-align: right;
        }
        li {
            background: #2b2b2b;
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 255, 153, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info {
            flex: 1;
            text-align: right;
        }
        .item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button {
            background: #00ffaa;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #00ff99;
        }
        .quantity {
            min-width: 30px;
            text-align: center;
            font-weight: bold;
            color: #00ffaa;
        }
        .total {
            font-size: 20px;
            color: #00ffaa;
            margin-top: 10px;
            margin-bottom: 20px;
            text-align: right;
        }
        .btn, .clear-btn {
            display: inline-block;
            background: linear-gradient(to right, #00ffaa, #00ff99);
            color: #000;
            padding: 12px 25px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 255, 153, 0.3);
            cursor: pointer;
        }
        .btn:hover, .clear-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 18px rgba(0, 255, 153, 0.4);
        }
        #actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="cart-box">
        <h2>🛒 محتويات السلة</h2>
        <div id="actions">
            <button class="clear-btn" id="clear-cart-btn">🗑️ مسح السلة</button>
        </div>
        <ul id="cart-items"></ul>
        <div class="total" id="total"></div>
        <a id="pay-btn" href="#" class="btn">💳 الدفع الآن</a>
    </div>

    <script>
        // جلب السلة من التخزين المحلي أو إنشاء مصفوفة فارغة
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        const list = document.getElementById("cart-items");
        const totalBox = document.getElementById("total");
        const payBtn = document.getElementById("pay-btn");
        const clearBtn = document.getElementById("clear-cart-btn");

        // رقم الهاتف المستخدم في كود USSD (يمكن تغييره)
        const phoneNumber = "0926527327";

        // دالة تحديث العرض الكامل للسلة
        function renderCart() {
            list.innerHTML = "";

            if (cart.length === 0) {
                let li = document.createElement("li");
                li.textContent = "🛍️ السلة فارغة حالياً";
                li.style.justifyContent = "center";
                list.appendChild(li);
                payBtn.style.display = "none";
                totalBox.textContent = "";
                return;
            }

            payBtn.style.display = "inline-block";
            let total = 0;

            cart.forEach((item, index) => {
                const li = document.createElement("li");

                // جزء معلومات المنتج
                const info = document.createElement("div");
                info.className = "item-info";
                info.textContent = `${item.name} - ${item.price} دينار`;

                // جزء التحكم في الكمية والحذف
                const controls = document.createElement("div");
                controls.className = "item-controls";

                // زر نقصان الكمية
                const minusBtn = document.createElement("button");
                minusBtn.textContent = "−";
                minusBtn.title = "نقصان الكمية";
                minusBtn.onclick = () => {
                    if (item.quantity > 1) {
                        item.quantity--;
                    } else {
                        // حذف العنصر إذا الكمية 1 وتم نقصانها
                        cart.splice(index, 1);
                    }
                    saveAndRender();
                };

                // عرض الكمية
                const qty = document.createElement("span");
                qty.className = "quantity";
                qty.textContent = item.quantity;

                // زر زيادة الكمية
                const plusBtn = document.createElement("button");
                plusBtn.textContent = "+";
                plusBtn.title = "زيادة الكمية";
                plusBtn.onclick = () => {
                    item.quantity++;
                    saveAndRender();
                };

                // زر حذف العنصر
                const delBtn = document.createElement("button");
                delBtn.textContent = "✕";
                delBtn.title = "حذف العنصر";
                delBtn.onclick = () => {
                    cart.splice(index, 1);
                    saveAndRender();
                };

                // تركيب الأزرار ضمن عنصر التحكم
                controls.appendChild(minusBtn);
                controls.appendChild(qty);
                controls.appendChild(plusBtn);
                controls.appendChild(delBtn);

                // تركيب معلومات المنتج وأزرار التحكم ضمن العنصر
                li.appendChild(info);
                li.appendChild(controls);

                list.appendChild(li);

                // حساب الإجمالي (السعر * الكمية)
                total += parseFloat(item.price) * item.quantity;
            });

            totalBox.textContent = "الإجمالي: " + total.toFixed(2) + " دينار";

            // تحديث رابط الدفع مع كود USSD بناءً على الإجمالي
            let ussdCode = `*122*${phoneNumber}*${Math.round(total * 1000)}*1#`;
            payBtn.href = "tel:" + encodeURIComponent(ussdCode);
        }

        // حفظ السلة في التخزين المحلي وتحديث العرض
        function saveAndRender() {
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        // مسح السلة بالكامل
        clearBtn.onclick = () => {
            if (confirm("هل أنت متأكد من مسح جميع العناصر من السلة؟")) {
                cart = [];
                saveAndRender();
            }
        };

        // إذا كانت بعض العناصر لا تحتوي على خاصية quantity نضيفها تلقائياً (للتوافق)
        cart.forEach(item => {
            if (typeof item.quantity !== "number" || item.quantity < 1) {
                item.quantity = 1;
            }
        });

        // عرض السلة لأول مرة
        renderCart();
    </script>
</body>
</html>
