<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>أفضل موقع على كوكب الأرض</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- الخطوط -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #0f0f0f, #000);
      color: #00ff88;
      font-family: 'Cairo', sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    h2, h3 {
      margin-bottom: 20px;
      font-size: 30px;
    }

    .login-box, .phone-box {
      background: #1a1a1a;
      padding: 35px 25px;
      margin: 50px auto;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 25px rgba(0, 255, 136, 0.2);
      transition: 0.3s ease;
    }

    .login-box:hover, .phone-box:hover {
      box-shadow: 0 0 45px rgba(0, 255, 136, 0.4);
    }

    input {
      width: 95%;
      padding: 12px 15px;
      margin: 15px auto;
      border: none;
      border-radius: 12px;
      background: #111;
      color: #00ff88;
      font-size: 16px;
      box-shadow: inset 0 0 8px rgba(0, 255, 136, 0.3);
      transition: 0.3s;
    }

    input:focus {
      outline: none;
      box-shadow: 0 0 12px #00ffaa;
    }

    .btn, .send-btn {
      background: linear-gradient(to right, #00ffaa, #00ff88);
      color: #000;
      font-size: 18px;
      font-weight: bold;
      padding: 12px 30px;
      margin: 10px 0;
      border: none;
      border-radius: 40px;
      width: 100%;
      max-width: 400px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 255, 136, 0.3);
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .btn:hover, .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
    }

    .btn.google {
      background: linear-gradient(to right, #db4437, #e74c3c);
      color: #fff;
    }

    .btn.facebook {
      background: linear-gradient(to right, #3b5998, #4a69ad);
      color: #fff;
    }

    .btn i {
      margin-left: 8px;
    }

    hr {
      margin: 30px auto;
      border: 0;
      height: 1px;
      background: #333;
      width: 80%;
    }

    .message {
      font-size: 18px;
      margin-top: 20px;
      color: #00ffaa;
    }

    .message.error {
      color: #ff4d4d;
    }

    footer {
      margin-top: 40px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>تسجيل الدخول</h2>

    <button class="btn google">
      <i class="fab fa-google"></i> تسجيل دخول عبر Google
    </button>
    
    <button class="btn facebook">
      <i class="fab fa-facebook-f"></i> تسجيل دخول عبر Facebook
    </button>
    
    <hr />

    <input type="email" placeholder="البريد الإلكتروني" />
    <input type="password" placeholder="كلمة المرور" />
    <button class="btn">دخول</button>
  </div>

  <div class="phone-box">
    <h3>أدخل رقم هاتفك لتفعيل الحساب</h3>
    <input type="tel" id="phoneInput" placeholder="مثال: 0920000000" />
    <button class="send-btn" onclick="sendPhoneNumber()">إرسال الرقم</button>
    <div id="responseMessage" class="message"></div>
  </div>

  <footer>
    © 2025 - تم التطوير بحُب من طرف <strong>𝘼𝘽𝘿𝙊</strong> | <a href="https://t.me/J_E_OO" style="color:#00ffaa;">@J_E_OO</a>
  </footer>

  <script>
    function sendPhoneNumber() {
      const phone = document.getElementById('phoneInput').value.trim();
      const responseMessage = document.getElementById('responseMessage');

      if (!phone) {
        responseMessage.textContent = 'يرجى إدخال رقم الهاتف.';
        responseMessage.classList.add('error');
        return;
      }

      const apiUrl = 'https://your-server.com/send-phone?phone=' + encodeURIComponent(phone);

      fetch(apiUrl)
        .then(response => {
          if (!response.ok) throw new Error('فشل في إرسال الرقم');
          return response.json();
        })
        .then(data => {
          if (data.success) {
            responseMessage.textContent = '✅ تم إرسال رقم هاتفك بنجاح!';
            responseMessage.classList.remove('error');
          } else {
            responseMessage.textContent = '❌ حدث خطأ أثناء الإرسال.';
            responseMessage.classList.add('error');
          }
        })
        .catch(() => {
          responseMessage.textContent = '⚠️ تعذر الاتصال بالخادم.';
          responseMessage.classList.add('error');
        });
    }
  </script>
</body>
</html>
