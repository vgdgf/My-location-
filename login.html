<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- رابط الخط العربي الجميل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <!-- ربط ملف CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(145deg, #0d0d0d, #1a1a1a);
            color: #00ff88;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .login-box {
            background: #1b1b1b;
            padding: 30px;
            margin: 50px auto;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.15);
            transition: box-shadow 0.3s ease;
        }

        .login-box:hover {
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.3);
        }

        h2 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        .btn {
            background: linear-gradient(to right, #00ff88, #00ffaa);
            color: #000;
            padding: 12px 25px;
            margin: 10px 0;
            text-decoration: none;
            border: none;
            border-radius: 30px;
            display: block;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.3);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 18px rgba(0, 255, 136, 0.5);
        }

        input {
            display: block;
            width: 95%;
            padding: 12px 15px;
            margin: 15px auto;
            border: none;
            border-radius: 10px;
            background: #111;
            color: #0f0;
            font-size: 16px;
            box-shadow: inset 0 0 5px rgba(0, 255, 136, 0.3);
            transition: box-shadow 0.3s ease;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px #00ff88;
        }

        hr {
            margin: 30px auto;
            border: 0;
            height: 1px;
            background: #333;
            width: 80%;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>تسجيل الدخول</h2>
        <button class="btn" style="background: linear-gradient(to right, #db4437, #e74c3c); color: #fff;">تسجيل دخول عبر Google</button>
        <button class="btn" style="background: linear-gradient(to right, #3b5998, #4a69ad); color: #fff;">تسجيل دخول عبر Facebook</button>
        <hr>
        <input type="email" placeholder="البريد الإلكتروني">
        <input type="password" placeholder="كلمة المرور">
        <button class="btn">دخول</button>
    </div>
</body>
</html>
